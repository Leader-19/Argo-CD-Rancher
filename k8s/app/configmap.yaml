apiVersion: v1
kind: ConfigMap
metadata:
  name: laravel-config
  namespace: laravel-app
data:
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://your-app.example.com"
  LOG_CHANNEL: "stderr"
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  CACHE_STORE: "database"
  SESSION_DRIVER: "database"
  QUEUE_CONNECTION: "database"
