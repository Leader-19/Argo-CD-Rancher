# Same warning as k8s/mysql/secret.yaml: don't commit real values.
# Manage via Rancher's Secrets UI or an encrypted-at-rest tool (Sealed
# Secrets / SOPS / External Secrets Operator) synced by ArgoCD.
apiVersion: v1
kind: Secret
metadata:
  name: laravel-secrets
  namespace: laravel-app
type: Opaque
stringData:
  # Generate with: php artisan key:generate --show
  APP_KEY: "base64:CHANGE_ME"
