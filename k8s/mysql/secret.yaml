# DO NOT commit real secrets to git in plaintext.
# Recommended: manage this via Rancher's Secrets UI, or seal it with
# "Sealed Secrets" / "SOPS" / "External Secrets Operator" and let ArgoCD
# sync the sealed/encrypted version instead. This file is a placeholder
# so the structure is clear.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: laravel-app
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "CHANGE_ME"
  MYSQL_DATABASE: "laravel"
  MYSQL_USER: "laravel"
  MYSQL_PASSWORD: "CHANGE_ME"
